<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIGC 文创生成</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="page">
  <h2>AIGC 文创生成</h2>

  <div class="panel">
    <input type="text" id="prompt" placeholder="例如：以青铜鼎纹样为灵感的国潮海报">
    <button onclick="generateImg()">生成</button>
    <p id="generateStatus" class="status"></p>
    <img id="img" class="preview hidden" alt="生成图片">
  </div>

  <button onclick="history.back()">返回</button>
  <script src="script.js"></script>
</body>
</html>
