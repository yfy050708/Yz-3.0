<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 智能讲解</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="page">
  <h2>AI 智能讲解</h2>

  <div class="panel">
    <textarea id="text" placeholder="请输入文物名称或简短描述"></textarea>
    <br>
    <button onclick="generateExplain()">生成</button>
    <button onclick="speak()">播放</button>
    <p id="explainStatus" class="status"></p>
    <p id="output" class="result-card"></p>
  </div>

  <button onclick="history.back()">返回</button>
  <script src="script.js"></script>
</body>
</html>
