<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>智能导览</title>

<style>
body { margin:0; font-family:"Microsoft YaHei"; }
.map-container { display:flex; height:100vh; }
.sidebar {
    width:260px;
    background:rgba(0,0,0,0.8);
    color:white;
    padding:10px;
}
.spot { padding:12px; cursor:pointer; border-bottom:1px solid #444; }
.spot:hover { background: rgba(0,255,255,0.3); }
#map { flex:1; }

.info-container { display:flex; align-items:flex-start; }
.info-img {
    width:220px;
    height:150px;
    object-fit:cover;
    border:2px solid #fff;
    margin-right:10px;
}
.info-text {
    color:#000;
    max-width:200px;
    text-align:left;
    font-size:14px;
}
</style>
</head>

<body>
<div class="map-container">
    <div class="sidebar">
        <h3>景点导航</h3>
        <div class="spot" onclick="focusSpot(0)">承德避暑山庄</div>
        <div class="spot" onclick="focusSpot(1)">金山岭长城</div>
        <div class="spot" onclick="focusSpot(2)">娲皇宫</div>
        <div class="spot" onclick="focusSpot(3)">广府古城</div>
        <div class="spot" onclick="focusSpot(4)">山海关</div>
    </div>
    <div id="map"></div>
</div>

<button onclick="history.back()">返回</button>

<script src="https://webapi.amap.com/maps?v=2.0&key=b0bce62c2fc045d40875aab4c239fe31"></script>

<script>
let map, markers=[], activeIndex=0, infoWindow;

// 景点数据（多图 + 描述）
const spots = [
    {
        name:"承德避暑山庄",
        pos:[117.93,40.97],
        imgs:["assets/承德避暑山庄1.jpg","assets/承德避暑山庄2.jpg","assets/承德避暑山庄3.jpg"],
        desc:"承德避暑山庄是清代皇帝避暑和处理政务的场所，建筑风格独特，融中西之美。"
    },
    {
        name:"金山岭长城",
        pos:[117.24,40.68],
        imgs:["assets/金山岭长城1.jpg","assets/金山岭长城2.jpg","assets/金山岭长城3.jpg","assets/金山岭长城4.jpg"],
        desc:"金山岭长城以险峻著称，保存完整，是长城精华段之一。"
    },
    {
        name:"娲皇宫",
        pos:[113.68,36.57],
        imgs:["assets/娲皇宫1.jpg","assets/娲皇宫2.jpg","assets/娲皇宫3.jpg"],
        desc:"娲皇宫供奉女娲，建筑古朴，文化底蕴深厚。"
    },
    {
        name:"广府古城",
        pos:[115.48,38.88],
        imgs:["assets/广府古城1.jpg","assets/广府古城2.jpg","assets/广府古城3.jpg"],
        desc:"广府古城是历史文化名城，保存了完整的明清古建筑风貌。"
    },
    {
        name:"山海关",
        pos:[119.75,40.01],
        imgs:["assets/山海关1.jpg","assets/山海关2.jpg","assets/山海关3.jpg"],
        desc:"山海关是长城东端重要关口，以“天下第一关”著称。"
    }
];

function initMap() {
    map = new AMap.Map('map',{zoom:8, center:spots[0].pos});
    infoWindow = new AMap.InfoWindow({autoMove:true, isCustom:true});
    createMarkers();
    highlightMarker(0);
}

function createMarkers() {
    spots.forEach((s,index)=>{
        let marker = new AMap.Marker({
            position:s.pos,
            map:map,
            icon:new AMap.Icon({size:new AMap.Size(25,34), image:"https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png"})
        });

        marker.on('mouseover',()=>{
            highlightMarker(index);
            showInfo(index);
        });

        marker.on('click',()=>focusSpot(index));
        markers.push(marker);
    });
}

function focusSpot(index){
    activeIndex=index;
    map.setZoomAndCenter(10, spots[index].pos);
}

function highlightMarker(index){
    markers.forEach((m,i)=>{
        m.setIcon(new AMap.Icon({
            size: new AMap.Size(i===index?40:25, i===index?50:34),
            image: i===index?"https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png":"https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png"
        }));
    });
}

function showInfo(index){
    const s=spots[index];
    const content = `
        <div class="info-container" style="pointer-events:auto;">
            <img id="infoImg" src="${s.imgs[0]}" class="info-img">
            <div class="info-text">
                <h3>${s.name}</h3>
                <p>${s.desc}</p>
                <button onclick="prevImg()">⬅️</button>
                <button onclick="nextImg()">➡️</button>
            </div>
        </div>
    `;
    infoWindow.setContent(content);
    infoWindow.open(map, s.pos);
    window.currentImgs = s.imgs;
    window.currentIndex = 0;
}

function nextImg(){
    currentIndex++;
    if(currentIndex>=currentImgs.length) currentIndex=0;
    document.getElementById("infoImg").src=currentImgs[currentIndex];
}

function prevImg(){
    currentIndex--;
    if(currentIndex<0) currentIndex=currentImgs.length-1;
    document.getElementById("infoImg").src=currentImgs[currentIndex];
}

window.onload = initMap;
</script>
</body>
</html>
