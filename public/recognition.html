<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 文物识别</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="page">
  <h2>AI 文物识别</h2>

  <div class="panel">
    <input type="file" id="artifactFile" accept="image/*">
    <button onclick="recognize()">识别</button>
    <p id="recognitionStatus" class="status"></p>
    <img id="artifactPreview" class="preview hidden" alt="上传预览">
    <div id="result" class="result-card"></div>
  </div>

  <button onclick="history.back()">返回</button>
  <script src="script.js"></script>
</body>
</html>
